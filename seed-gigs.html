    }
    .gig-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;

      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌱 Seed Gigs</h1>
    <p>This will add 15 dummy gigs to your Bartr.in database for testing. Make sure you're logged in to the main app first!</p>
    
    <button id="seedBtn" onclick="seedGigs()">Add Dummy Gigs</button>
    
    <div id="status"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xuteqibmehtcjdebvssm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_whIWS49D5sAIdaECen-e8g_qCaUJweQ';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const dummyGigs = [

      {

      },
      {
        title: 'Mobile App Development - Fitness Tracker',
        category: 'Digital',

        description: 'Need Android & iOS app for fitness tracking. Features: workout logging, calorie counter, progress charts, social sharing. Must integrate with Google Fit and Apple Health. 2-3 months timeline.',
        location: 'Remote',
        status: 'Active'
      },
      {
        title: 'Electrician for Home Wiring',
        category: 'Manual',
        price: '₹3,000',
        description: 'Need certified electrician to fix electrical wiring issues in my home. Some switches not working, need new fan installation, and general safety check. Urgent requirement.',
        location: 'Sitabuldi, Nagpur',
        status: 'Active'
      },
      {
        title: 'Content Writer for Blog Posts',
        category: 'Digital',

        description: 'Looking for experienced content writer for tech blog. Need 10 articles per month (800-1000 words each). Topics: AI, web development, mobile apps. SEO knowledge required.',
        location: 'Remote',

      },
      {

        category: 'Manual',
        price: '₹12,000',
        description: 'Need skilled carpenter to build custom bookshelf and study table. Have specific design in mind. Quality wood work required. Will provide materials, need labor and expertise.',
        location: 'Laxmi Nagar, Nagpur',

      {

      {

        price: '₹2,500',

      {

        category: 'Creative',
        price: '₹3,000',
        description: 'Looking for professional voice over artist (male/female) for 30-second radio commercial. Need clear, energetic voice. Hindi and English both required. Send voice samples.',
        location: 'Remote',
        status: 'Active'

    ];

    async function seedGigs() {
      const btn = document.getElementById('seedBtn');
      const status = document.getElementById('status');
      
      btn.disabled = true;
      btn.textContent = 'Adding Gigs...';
      status.className = 'info';
      status.style.display = 'block';
      status.innerHTML = '⏳ Checking authentication...';

      try {
        // Check if user is logged in
        const { data: { user }, error: userError } = await supabase.auth.getUser();
        
        if (userError || !user) {
          throw new Error('You must be logged in! Please login to Bartr.in first, then come back to this page.');
        }

        status.innerHTML = `✅ Logged in as: ${user.email}<br>📝 Adding ${dummyGigs.length} gigs...`;

        // Add client_id to each gig
        const gigsWithClient = dummyGigs.map(gig => ({
          ...gig,
          client_id: user.id
        }));

        // Insert gigs
        const { data, error } = await supabase
          .from('gigs')
          .insert(gigsWithClient)
          .select();

        if (error) {
          throw error;
        }

        // Success!
        status.className = 'success';
        
        const categoryCounts = {};
        data.forEach(gig => {
          categoryCounts[gig.category] = (categoryCounts[gig.category] || 0) + 1;
        });

        let html = `<strong>🎉 Successfully added ${data.length} gigs!</strong><br><br>`;
        html += '<div class="gig-list">';
        
        Object.entries(categoryCounts).forEach(([category, count]) => {
          html += `<div class="gig-item"><span class="gig-category">${category}</span> ${count} gigs</div>`;
        });
        
        html += '</div><br>';
        html += '<strong>💡 Now you can:</strong><br>';
        html += '• Browse gigs on the Gigs page<br>';
        html += '• Apply to gigs<br>';
        html += '• Test chat functionality<br>';
        html += '• Try negotiation features<br><br>';
        html += '<em>Tip: Create another account to test the full experience!</em>';
        
        status.innerHTML = html;
        btn.textContent = '✅ Gigs Added!';
        btn.style.background = '#10b981';

      } catch (error) {
        status.className = 'error';
        status.innerHTML = `<strong>❌ Error:</strong><br>${error.message}`;
        btn.disabled = false;
        btn.textContent = 'Try Again';
      }
    }
  </script>
